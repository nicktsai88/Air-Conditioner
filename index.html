<!DOCTYPE html>

    <style>
        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdfa; /* 換成偏冷的清涼色系 */
            background-image: radial-gradient(#ccfbf1 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #115e59;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #99f6e4;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 12px;
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #e0f2fe;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
            border: 3px solid #e0f2fe;
        }
        
        /* 系統狀態燈號與動畫 */
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-loading { background-color: #fbbf24; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; box-shadow: 0 0 8px #fbbf24; }
        .status-success { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .status-error { background-color: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden">

        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================

        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hair-salon-app-default';
        const COLLECTION_NAME = 'Air-Conditioner'; // 更新為新資料表
        const DOC_GLOBAL = 'Global_Users_AirConditioner';      
        
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        
        // 資料結構
        let userData = { acData: {}, loginHistory: [] }; 
        let connectionStatus = 'loading';
        let recentUsers = [];

        // 營收資料狀態 (關聯至 userData.acData)
        let appData = {};

        // 依照 PDF 表格建立的分店與冷氣相片對應清單
        const acConfig = [

            { branch: '大昌店', photo: 's2-1.jpg' }, { branch: '大昌店', photo: 's2-2.jpg' },

            { branch: '左營店', photo: 's5-1.jpg' }, { branch: '左營店', photo: 's5-2.jpg' },

            { branch: '自由店', photo: 's15-1.jpg' }, { branch: '自由店', photo: 's15-2.jpg' },
            { branch: '福山店', photo: 's16-1.jpg' },
            { branch: '大寮店', photo: 's17-1.jpg' }, { branch: '大寮店', photo: 's17-2.jpg' },
            { branch: '復興店', photo: 's18-1.jpg' },

            { branch: '華夏店', photo: 's21-1.jpg' },
            { branch: '武廟店', photo: 's22-1.jpg' }, { branch: '武廟店', photo: 's22-2.jpg' },
            { branch: '小港店', photo: 's23-1.jpg' },
            { branch: '斗六1店', photo: 's24-1.jpg' }, { branch: '斗六1店', photo: 's24-2.jpg' },
            { branch: '斗六2店', photo: 's25-1.jpg' }, { branch: '斗六2店', photo: 's25-2.jpg' },
            { branch: '虎尾店', photo: 's26-1.jpg' }, { branch: '虎尾店', photo: 's26-2.jpg' },
            { branch: '草屯店', photo: 's27-1.jpg' }
        ];

        // ==========================================
        //  Date Calculations
        // ==========================================
        window.diffYMD = (startStr) => {
            if (!startStr) return '-';
            const start = new Date(startStr);
            const today = new Date();
            if (start > today) return '0年00月00日';
            let y = today.getFullYear() - start.getFullYear();
            let m = today.getMonth() - start.getMonth();
            let d = today.getDate() - start.getDate();
            if (d < 0) {
                m--;
                const prev = new Date(today.getFullYear(), today.getMonth(), 0);
                d += prev.getDate();
            }
            if (m < 0) {
                y--;
                m += 12;
            }
            return `${y}年${m.toString().padStart(2, '0')}月${d.toString().padStart(2, '0')}日`;
        };

        window.diffMD = (startStr) => {
            if (!startStr) return { text: '-', days: 0 };
            const start = new Date(startStr);
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            const totalDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            if (start > today) return { text: '00月00日', days: 0 };
            let m = (today.getFullYear() - start.getFullYear()) * 12 + today.getMonth() - start.getMonth();
            let d = today.getDate() - start.getDate();
            if (d < 0) {
                m--;
                const prev = new Date(today.getFullYear(), today.getMonth(), 0);
                d += prev.getDate();
            }
            return { text: `${m.toString().padStart(2, '0')}月${d.toString().padStart(2, '0')}日`, days: totalDays };
        };

        window.renderFilterTime = (startStr) => {
            const data = diffMD(startStr);
            if (data.text === '-') return '-';
            if (data.days > 30) {
                return `<span class="text-red-600 font-extrabold bg-red-100 px-2 py-1 rounded shadow-sm border border-red-300 animate-pulse">${data.text} <br><span class="text-xs">(該洗濾網了)</span></span>`;
            }
            return `<span class="text-cyan-700 font-bold">${data.text}</span>`;
        };

        // ==========================================
        //  Firebase Initialization
        // ==========================================
        try {
            const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            if (actualConfig.apiKey && actualConfig.apiKey !== "填入key" && actualConfig.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(actualConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseInitialized = true;
                connectionStatus = 'success';
            } else { connectionStatus = 'error'; }
        } catch (error) { connectionStatus = 'error'; }

        const initAuth = async () => {
            if (!isFirebaseInitialized) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { connectionStatus = 'error'; }
        };

        const el = id => document.getElementById(id);

        // ==========================================
        //  Data Sync & Listeners
        // ==========================================
        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = Object.assign({ acData: {}, loginHistory: [] }, docSnap.data());
                    appData = userData.acData || {};
                    saveLocalData(name);
                } else {
                    userData = { acData: {}, loginHistory: [new Date().toISOString()] };
                    appData = {};
                    setDoc(userRef, userData, { merge: true });
                }
                if(currentTab === 'main') renderMainGrid();
            }, (error) => console.error("Listen user error", error));
        };

        window.saveUserDataToCloud = async () => {
            userData.acData = appData;
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            
            const btn = document.getElementById('save-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span>⏳</span> 儲存中...';
            
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { 
                await setDoc(userRef, userData, { merge: true }); 
                btn.innerHTML = '<span>✅</span> 儲存成功！';
                btn.classList.add('from-emerald-400', 'to-teal-500');
            } catch(e) { 
                console.error("Firebase save error:", e); 
                btn.innerHTML = '<span>❌</span> 儲存失敗';
                btn.classList.add('from-red-400', 'to-rose-500');
            }
            setTimeout(() => { 
                btn.innerHTML = originalHtml; 
                btn.classList.remove('from-emerald-400', 'to-teal-500', 'from-red-400', 'to-rose-500');
            }, 2000);
        };

        const loadLocalData = (name) => {
            try {
                const localData = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (localData) {
                    userData = Object.assign({ acData: {}, loginHistory: [] }, JSON.parse(localData));
                    appData = userData.acData || {};
                }
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        // ==========================================
        //  App Initialization & Auth Flow
        // ==========================================
        const initApp = async () => {
            renderApp();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            setTimeout(() => listenToUserDocument(username), 200);
                            currentTab = 'main';
                            renderMain();
                        } else renderLogin();
                    } else renderLogin();
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    loadLocalData(username);
                    currentTab = 'main';
                    renderMain();
                } else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "✍️ 請輸入登入名稱";
                }, 2000);
                return;
            }
            username = name;
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ acData: {}, loginHistory: [] }, snap.data());
                        appData = userData.acData || {};
                    } else loadLocalData(username);
                    
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    
                    await setDoc(userRef, userData, { merge: true });
                    
                    // Update global recent users
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                } catch(e) { console.error("Login data sync error:", e); }
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            currentTab = 'main';
            renderMain();
        };

        window.logout = () => {
            username = '';
            userData = { acData: {}, loginHistory: [] };
            appData = {};
            localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
            if(unsubscribeUser) unsubscribeUser();
            renderLogin();
        };

        // ==========================================
        //  Views Rendering
        // ==========================================
        const renderApp = () => { el('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative"></div>`; };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative animate-fade-in z-10 overflow-y-auto">
                    <div class="absolute top-6 right-6 z-20">
                        <div class="glass-panel px-4 py-2 rounded-full shadow-sm text-sm font-bold text-cyan-800 flex items-center">
                            <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                            ${connectionStatus === 'loading' ? '雲端讀取中... ⏳' : connectionStatus === 'success' ? '雲端已同步 ☁️✨' : '雲端連線失敗 ❌'}
                        </div>
                    </div>
                    
                    <div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl z-10 w-[32rem] max-w-[95vw] text-center border-4 border-cyan-200">
                        <div class="w-24 h-24 bg-cyan-100 rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-inner border border-cyan-300 transform -rotate-3">

                        <h1 class="text-3xl md:text-4xl font-extrabold text-cyan-600 mb-2 drop-shadow-sm">囍事快剪</h1>

                        <div class="space-y-5">

                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-4 px-6 text-xl rounded-xl shadow-lg transition-all transform hover:scale-105">
                                進入系統 🚀
                            </button>
                        </div>
                        
                        <div class="mt-8 pt-6 border-t-2 border-cyan-100 border-dashed">
                            <p class="text-sm text-cyan-500 mb-4 font-bold">☁️ 雲端最近登入紀錄</p>
                            <div class="flex flex-wrap justify-center gap-2">
                                ${recentUsers.length > 0 ? recentUsers.slice().reverse().slice(0, 6).map(u => `<button onclick="handleLogin('${u.name}')" class="text-sm font-bold bg-white border border-cyan-200 text-cyan-600 hover:bg-cyan-50 hover:border-cyan-300 px-4 py-2 rounded-lg shadow-sm transition-all">${u.name}</button>`).join('') : `<span class="text-sm text-cyan-300">尚無紀錄</span>`}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            el('view-container').innerHTML = `
                <div class="w-full h-full flex flex-col p-3 md:p-6 animate-fade-in relative z-10">
                    <div class="max-w-[1800px] mx-auto w-full h-full flex flex-col min-h-0">
                        
                        <!-- 標題與導覽區塊 -->
                        <div class="relative mb-4 shrink-0 bg-white/80 rounded-3xl p-5 shadow-sm border-2 border-cyan-100 flex flex-col xl:flex-row items-center justify-between w-full gap-4">
                            <div class="flex flex-col md:flex-row items-center gap-4">
                                <img src="images/logo.jpg" alt="公司 Logo" class="h-14 md:h-16 w-auto rounded-xl shadow-sm object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 rx=%2210%22 fill=%22%23cffafe%22/%3E%3Ctext x=%2250%22 y=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%230891b2%22%3ELOGO%3C/text%3E%3C/svg%3E';">
                                <div class="text-center xl:text-left">
                                    <h1 class="text-2xl md:text-3xl font-bold text-cyan-600 drop-shadow-sm">
                                        ❄️ 2026年 囍事快剪 - 冷氣保養一覽表 ❄️
                                    </h1>
                                    <p class="text-cyan-500 mt-1 font-semibold text-sm">變更後將自動暫存，點擊右方按鈕即可同步至雲端 ☁️</p>
                                </div>
                            </div>
                            
                            <!-- 帳號與連線狀態 -->
                            <div class="flex flex-col items-center xl:items-end gap-2 mt-2 xl:mt-0 bg-cyan-50 p-3 rounded-2xl border border-cyan-100 shadow-inner">
                                <div class="flex items-center text-xs font-bold text-cyan-700 bg-white px-3 py-1 rounded-full border border-cyan-200">
                                    <span class="status-dot ${connectionStatus === 'loading' ? 'bg-amber-400 animate-pulse' : connectionStatus === 'success' ? 'bg-emerald-400' : 'bg-rose-500'}"></span>
                                    <span>${connectionStatus === 'loading' ? '雲端讀取中...' : connectionStatus === 'success' ? '資料已自動同步' : '離線模式'}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <button id="save-btn" onclick="saveUserDataToCloud()" class="bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-white font-bold px-4 py-2 rounded-lg shadow-md transform hover:scale-105 transition-all flex items-center gap-2">
                                        <span>💾</span> 儲存並同步至雲端
                                    </button>
                                    <span class="font-bold text-blue-800 text-base">👤 ${username}</span>
                                    <button onclick="logout()" class="text-rose-500 hover:text-white bg-white hover:bg-rose-400 px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm transition-all font-bold text-xs flex items-center"><span class="mr-1">🚪</span>登出</button>
                                </div>
                            </div>
                        </div>

                        <!-- 冷氣表單主體 -->
                        <div class="glass-panel rounded-3xl shadow-xl flex flex-col flex-1 min-h-0 mb-2">
                            <div class="overflow-auto custom-scrollbar p-2 md:p-4 flex-1 relative bg-white/30 rounded-3xl">
                                <div class="w-max min-w-full pb-1 pr-1 flex flex-col">
                                    
                                    <!-- 表格標頭 -->
                                    <div class="grid grid-cols-[100px_140px_130px_130px_150px_130px_150px_130px_150px_180px_200px] gap-2 items-center bg-cyan-500 text-white font-bold p-3 rounded-xl shadow-md whitespace-nowrap sticky top-0 z-30 outline outline-2 outline-[#f0fdfa]/50 mb-2">
                                        <div class="text-center">🏪 分店</div>
                                        <div class="text-center">📸 照片</div>
                                        <div class="text-center">❄️ 冷氣品牌</div>
                                        <div class="text-center">🏷️ 型號</div>
                                        <div class="text-center">📅 安裝日期</div>
                                        <div class="text-center">⏳ 使用時間</div>
                                        <div class="text-center">💦 冷氣清洗日期</div>
                                        <div class="text-center">⏳ 使用時間</div>
                                        <div class="text-center">🧽 濾網清洗日期</div>
                                        <div class="text-center">⏳ 使用時間</div>
                                        <div class="text-center">🛠️ 維修紀錄</div>
                                    </div>

                                    <!-- 資料列注入區 -->
                                    <div id="grid-body" class="flex flex-col gap-1"></div>
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            renderMainGrid();
        };

        window.renderMainGrid = () => {
            const gridBody = document.getElementById('grid-body');
            if(!gridBody) return;

            let html = '';
            let lastBranch = '';

            acConfig.forEach((item, index) => {
                const branch = item.branch;
                const photo = item.photo;
                const data = appData[photo] || { brand: '', model: '', installDate: '', acWashDate: '', filterWashDate: '', repairNotes: '' };

                const showBranchName = branch !== lastBranch;
                lastBranch = branch;

                html += `
                    <div class="grid grid-cols-[100px_140px_130px_130px_150px_130px_150px_130px_150px_180px_200px] gap-2 items-center p-2 border-b border-cyan-50 bg-white hover:bg-cyan-50 transition-colors w-max min-w-full rounded-xl">
                        <div class="font-extrabold text-cyan-800 text-center text-lg ${!showBranchName ? 'opacity-0' : ''}">${branch}</div>
                        
                        <!-- B欄位: 照片 -->
                        <div class="flex justify-center">
                            <img src="images/${photo}" class="w-full max-w-[120px] h-20 object-cover rounded-xl shadow-sm border border-cyan-200" alt="${photo}" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2280%22 viewBox=%220 0 120 80%22%3E%3Crect width=%22120%22 height=%2280%22 fill=%22%23cffafe%22/%3E%3Ctext x=%2260%22 y=%2245%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2214%22 text-anchor=%22middle%22 fill=%22%230891b2%22%3E無照片%3C/text%3E%3C/svg%3E';">
                        </div>
                        
                        <!-- C欄位: 冷氣品牌選單 -->
                        <div>
                            <select class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-gray-700 font-bold" data-photo="${photo}" data-field="brand">
                                <option value="" ${data.brand === '' ? 'selected' : ''}></option>
                                <option value="華菱" ${data.brand === '華菱' ? 'selected' : ''}>華菱</option>
                                <option value="富士通" ${data.brand === '富士通' ? 'selected' : ''}>富士通</option>
                                <option value="聲寶" ${data.brand === '聲寶' ? 'selected' : ''}>聲寶</option>
                                <option value="日立" ${data.brand === '日立' ? 'selected' : ''}>日立</option>
                                <option value="冰點" ${data.brand === '冰點' ? 'selected' : ''}>冰點</option>
                            </select>
                        </div>
                        
                        <!-- D欄位: 型號 -->
                        <div><input type="text" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-gray-700 font-bold placeholder-gray-300" placeholder="輸入型號" data-photo="${photo}" data-field="model" value="${data.model}"></div>
                        
                        <!-- E欄位: 安裝日期 -->
                        <div><input type="date" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-sm text-gray-600" data-photo="${photo}" data-field="installDate" value="${data.installDate}"></div>
                        
                        <!-- F欄位: 使用時間 (年/月/日) -->
                        <div id="f-${photo}" class="text-sm font-bold text-blue-700 text-center bg-blue-50 p-2.5 rounded-xl border border-blue-100 flex items-center justify-center h-[46px]">${diffYMD(data.installDate)}</div>
                        
                        <!-- G欄位: 冷氣清洗日期 -->
                        <div><input type="date" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-sm text-gray-600" data-photo="${photo}" data-field="acWashDate" value="${data.acWashDate}"></div>
                        
                        <!-- H欄位: 使用時間 (月/日) -->
                        <div id="h-${photo}" class="text-sm font-bold text-blue-700 text-center bg-blue-50 p-2.5 rounded-xl border border-blue-100 flex items-center justify-center h-[46px]">${diffMD(data.acWashDate).text}</div>
                        
                        <!-- I欄位: 濾網清洗日期 -->
                        <div><input type="date" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-sm text-gray-600" data-photo="${photo}" data-field="filterWashDate" value="${data.filterWashDate}"></div>
                        
                        <!-- J欄位: 使用時間 (判斷超過30天) -->
                        <div id="j-${photo}" class="text-sm text-center flex items-center justify-center h-[46px]">${renderFilterTime(data.filterWashDate)}</div>
                        
                        <!-- K欄位: 維修紀錄 -->
                        <div><input type="text" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-gray-700 font-bold placeholder-gray-300" placeholder="維修事項..." data-photo="${photo}" data-field="repairNotes" value="${data.repairNotes}"></div>
                    </div>
                `;
            });

            gridBody.innerHTML = html;
        };

        // 全域事件監聽：當任何 input 變更時，即時運算更新畫面，並儲存至暫存檔
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('ac-input')) {
                const photo = e.target.dataset.photo;
                const field = e.target.dataset.field;
                if (!appData[photo]) {
                    appData[photo] = { brand: '', model: '', installDate: '', acWashDate: '', filterWashDate: '', repairNotes: '' };
                }
                appData[photo][field] = e.target.value;

                // 即時運算並只更新指定欄位 (不會打斷使用者焦點)
                if (field === 'installDate') {
                    document.getElementById(`f-${photo}`).innerText = diffYMD(e.target.value);
                } else if (field === 'acWashDate') {
                    document.getElementById(`h-${photo}`).innerText = diffMD(e.target.value).text;
                } else if (field === 'filterWashDate') {
                    document.getElementById(`j-${photo}`).innerHTML = renderFilterTime(e.target.value);
                }

                // 本機自動暫存，保護資料
                userData.acData = appData;
                saveLocalData(username);
            }
        });

        // Initialize App
        initApp();

    </script>
</body>
</html>
