<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 2026年 囍事快剪冷氣保養紀錄系統 ❄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(#ccfbf1 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #115e59;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #99f6e4;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 12px;
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #e0f2fe;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
            border: 3px solid #e0f2fe;
        }
        
        /* 系統狀態燈號與動畫 */
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-loading { background-color: #fbbf24; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; box-shadow: 0 0 8px #fbbf24; }
        .status-success { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .status-error { background-color: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 確保 Table Sticky 工作正常 */
        table { border-collapse: separate; border-spacing: 0; }
        th { top: 0; }
        /* 加入 position: sticky 讓欄位固定 */
        .sticky-col { position: sticky; left: 0; z-index: 20; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); }
        .sticky-col-header { position: sticky; top: 0; left: 0; z-index: 40; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); }
        th.z-30 { z-index: 30; }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  Firebase Configuration & Constants
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hair-salon-app-default';
        const COLLECTION_NAME = 'Air-Conditioner';
        const DOC_GLOBAL = 'Global_Users_AirConditioner';      
        
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        
        // 資料結構
        let userData = { acData: {}, loginHistory: [] }; 
        let connectionStatus = 'loading';
        let recentUsers = [];
        let unsubscribeUser = null;
        let unsubscribeGlobal = null;
        let currentTab = 'login';
        
        // 維修紀錄彈窗狀態
        let currentRepairPhoto = '';
        
        // 營收資料狀態 (關聯至 userData.acData)
        let appData = {};

        // 依照 PDF 表格建立的分店與冷氣相片對應清單
        const acConfig = [
            { branch: '陽明店', photo: 's1-1.jpg' }, { branch: '陽明店', photo: 's1-2.jpg' },
            { branch: '大昌店', photo: 's2-1.jpg' }, { branch: '大昌店', photo: 's2-2.jpg' },
            { branch: '建興店', photo: 's3-1.jpg' }, { branch: '建興店', photo: 's3-2.jpg' },
            { branch: '後昌店', photo: 's4-1.jpg' }, { branch: '後昌店', photo: 's4-2.jpg' },
            { branch: '左營店', photo: 's5-1.jpg' }, { branch: '左營店', photo: 's5-2.jpg' },
            { branch: '明誠店', photo: 's6-1.jpg' }, { branch: '明誠店', photo: 's6-2.jpg' },
            { branch: '華榮店', photo: 's7-1.jpg' },
            { branch: '光遠店', photo: 's8-1.jpg' },
            { branch: '大社店', photo: 's9-1.jpg' },
            { branch: '內惟店', photo: 's10-1.jpg' }, { branch: '內惟店', photo: 's10-2.jpg' },
            { branch: '一心店', photo: 's11-1.jpg' }, { branch: '一心店', photo: 's11-2.jpg' },
            { branch: '五甲店', photo: 's12-1.jpg' }, { branch: '五甲店', photo: 's12-2.jpg' },
            { branch: '瑞隆店', photo: 's13-1.jpg' }, { branch: '瑞隆店', photo: 's13-2.jpg' },
            { branch: '德惠店', photo: 's14-1.jpg' }, { branch: '德惠店', photo: 's14-2.jpg' },
            { branch: '自由店', photo: 's15-1.jpg' }, { branch: '自由店', photo: 's15-2.jpg' },
            { branch: '福山店', photo: 's16-1.jpg' },
            { branch: '大寮店', photo: 's17-1.jpg' }, { branch: '大寮店', photo: 's17-2.jpg' },
            { branch: '復興店', photo: 's18-1.jpg' },
            { branch: '鼎中店', photo: 's19-1.jpg' },
            { branch: '十全店', photo: 's20-1.jpg' },
            { branch: '華夏店', photo: 's21-1.jpg' },
            { branch: '武廟店', photo: 's22-1.jpg' }, { branch: '武廟店', photo: 's22-2.jpg' },
            { branch: '小港店', photo: 's23-1.jpg' },
            { branch: '斗六1店', photo: 's24-1.jpg' }, { branch: '斗六1店', photo: 's24-2.jpg' },
            { branch: '斗六2店', photo: 's25-1.jpg' }, { branch: '斗六2店', photo: 's25-2.jpg' },
            { branch: '虎尾店', photo: 's26-1.jpg' }, { branch: '虎尾店', photo: 's26-2.jpg' },
            { branch: '草屯店', photo: 's27-1.jpg' }
        ];

        // 將清單依照分店整理，方便產生表格 Rowspan
        const branchesMap = {};
        acConfig.forEach(item => {
            if (!branchesMap[item.branch]) branchesMap[item.branch] = [];
            branchesMap[item.branch].push(item);
        });

        // ==========================================
        //  Date Calculations
        // ==========================================
        window.calculateUsageTime = (startStr) => {
            if (!startStr) return { text: '-', days: 0 };
            const start = new Date(startStr);
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            
            const totalDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            if (start > today) return { text: '0年00月00天', days: 0 };
            
            let y = today.getFullYear() - start.getFullYear();
            let m = today.getMonth() - start.getMonth();
            let d = today.getDate() - start.getDate();
            
            if (d < 0) {
                m--;
                const prev = new Date(today.getFullYear(), today.getMonth(), 0);
                d += prev.getDate();
            }
            if (m < 0) {
                y--;
                m += 12;
            }
            
            const text = `${y}年${m.toString().padStart(2, '0')}月${d.toString().padStart(2, '0')}天`;
            return { text, days: totalDays };
        };

        window.renderFilterTime = (startStr) => {
            const data = calculateUsageTime(startStr);
            if (data.text === '-') return '-';
            if (data.days > 30) {
                return `<span class="text-red-600 font-extrabold bg-red-100 px-2 py-1 rounded shadow-sm border border-red-300 animate-pulse inline-block">${data.text} <br><span class="text-xs">(該洗濾網了)</span></span>`;
            }
            return `<span class="text-emerald-700 font-bold">${data.text}</span>`;
        };

        // ==========================================
        //  Firebase Initialization
        // ==========================================
        try {
            const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            if (actualConfig.apiKey && actualConfig.apiKey !== "填入key" && actualConfig.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(actualConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseInitialized = true;
                connectionStatus = 'success';
            } else { connectionStatus = 'error'; }
        } catch (error) { connectionStatus = 'error'; }

        const initAuth = async () => {
            if (!isFirebaseInitialized) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { connectionStatus = 'error'; }
        };

        const el = id => document.getElementById(id);

        // ==========================================
        //  Data Sync & Listeners
        // ==========================================
        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = Object.assign({ acData: {}, loginHistory: [] }, docSnap.data());
                    appData = userData.acData || {};
                    saveLocalData(name);
                } else {
                    userData = { acData: {}, loginHistory: [new Date().toISOString()] };
                    appData = {};
                    setDoc(userRef, userData, { merge: true });
                }
                if(currentTab === 'main') renderMainGrid();
            }, (error) => console.error("Listen user error", error));
        };

        window.saveUserDataToCloud = async () => {
            userData.acData = appData;
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            
            const btn = document.getElementById('save-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span>⏳</span> 儲存中...';
            
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { 
                await setDoc(userRef, userData, { merge: true }); 
                btn.innerHTML = '<span>✅</span> 儲存成功！';
                btn.classList.add('from-emerald-400', 'to-teal-500');
            } catch(e) { 
                console.error("Firebase save error:", e); 
                btn.innerHTML = '<span>❌</span> 儲存失敗';
                btn.classList.add('from-red-400', 'to-rose-500');
            }
            setTimeout(() => { 
                btn.innerHTML = originalHtml; 
                btn.classList.remove('from-emerald-400', 'to-teal-500', 'from-red-400', 'to-rose-500');
            }, 2000);
        };

        const loadLocalData = (name) => {
            try {
                const localData = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (localData) {
                    userData = Object.assign({ acData: {}, loginHistory: [] }, JSON.parse(localData));
                    appData = userData.acData || {};
                }
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        // ==========================================
        //  App Initialization & Auth Flow
        // ==========================================
        const initApp = async () => {
            renderApp();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            setTimeout(() => listenToUserDocument(username), 200);
                            currentTab = 'main';
                            renderMain();
                        } else renderLogin();
                    } else renderLogin();
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    loadLocalData(username);
                    currentTab = 'main';
                    renderMain();
                } else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            // 固定將使用者名稱設為 Nick，讓所有使用者共享同一份資料庫
            username = 'Nick';
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ acData: {}, loginHistory: [] }, snap.data());
                        appData = userData.acData || {};
                    } else loadLocalData(username);
                    
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    
                    await setDoc(userRef, userData, { merge: true });
                    
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                } catch(e) { console.error("Login data sync error:", e); }
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            currentTab = 'main';
            renderMain();
        };

        window.logout = () => {
            username = '';
            userData = { acData: {}, loginHistory: [] };
            appData = {};
            localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
            if(unsubscribeUser) unsubscribeUser();
            renderLogin();
        };

        // ==========================================
        //  Views Rendering
        // ==========================================
        const renderApp = () => { el('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative"></div>`; };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative animate-fade-in z-10 overflow-y-auto">
                    <div class="absolute top-6 right-6 z-20">
                        <div class="glass-panel px-4 py-2 rounded-full shadow-sm text-sm font-bold text-cyan-800 flex items-center">
                            <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                            ${connectionStatus === 'loading' ? '雲端讀取中... ⏳' : connectionStatus === 'success' ? '雲端已同步 ☁️✨' : '雲端連線失敗 ❌'}
                        </div>
                    </div>
                    
                    <div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl z-10 w-[32rem] max-w-[95vw] text-center border-4 border-cyan-200">
                        <!-- 將原本的冰雪符號改為 logo.jpg -->
                        <div class="w-32 h-32 mx-auto mb-6 flex items-center justify-center">
                            <img src="images/logo.jpg" alt="囍事快剪" class="w-full h-full object-contain rounded-2xl shadow-sm border border-cyan-100" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 fill=%22%23cffafe%22/%3E%3Ctext x=%2250%22 y=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%230891b2%22%3ELOGO%3C/text%3E%3C/svg%3E';">
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-cyan-600 mb-2 drop-shadow-sm">囍事快剪</h1>
                        <h2 class="text-2xl font-bold text-cyan-500 mb-8 tracking-wider">冷氣保養紀錄系統</h2>
                        
                        <!-- 僅保留進入系統按鈕，並綁定 Nick -->
                        <div class="space-y-5">
                            <button onclick="handleLogin('Nick')" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-4 px-6 text-xl rounded-xl shadow-lg transition-all transform hover:scale-105">
                                進入系統 🚀
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            el('view-container').innerHTML = `
                <div class="w-full h-full flex flex-col p-3 md:p-6 animate-fade-in relative z-10">
                    <div class="max-w-[1800px] mx-auto w-full h-full flex flex-col min-h-0">
                        
                        <!-- 標題與導覽區塊 -->
                        <div class="relative mb-4 shrink-0 bg-white/80 rounded-3xl p-5 shadow-sm border-2 border-cyan-100 flex flex-col xl:flex-row items-center justify-between w-full gap-4">
                            <div class="flex flex-col md:flex-row items-center gap-4">
                                <img src="images/logo.jpg" alt="公司 Logo" class="h-14 md:h-16 w-auto rounded-xl shadow-sm object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 rx=%2210%22 fill=%22%23cffafe%22/%3E%3Ctext x=%2250%22 y=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%230891b2%22%3ELOGO%3C/text%3E%3C/svg%3E';">
                                <div class="text-center xl:text-left">
                                    <h1 class="text-2xl md:text-3xl font-bold text-cyan-600 drop-shadow-sm">
                                        ❄️ 2026年 囍事快剪 - 冷氣保養一覽表 ❄️
                                    </h1>
                                    <p class="text-cyan-500 mt-1 font-semibold text-sm">變更後將自動暫存，點擊右方按鈕即可同步至雲端 ☁️</p>
                                </div>
                            </div>
                            
                            <!-- 帳號與連線狀態 -->
                            <div class="flex flex-col items-center xl:items-end gap-2 mt-2 xl:mt-0 bg-cyan-50 p-3 rounded-2xl border border-cyan-100 shadow-inner">
                                <div class="flex items-center text-xs font-bold text-cyan-700 bg-white px-3 py-1 rounded-full border border-cyan-200">
                                    <span class="status-dot ${connectionStatus === 'loading' ? 'bg-amber-400 animate-pulse' : connectionStatus === 'success' ? 'bg-emerald-400' : 'bg-rose-500'}"></span>
                                    <span>${connectionStatus === 'loading' ? '雲端讀取中...' : connectionStatus === 'success' ? '資料已自動同步' : '離線模式'}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <button id="save-btn" onclick="saveUserDataToCloud()" class="bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-white font-bold px-4 py-2 rounded-lg shadow-md transform hover:scale-105 transition-all flex items-center gap-2">
                                        <span>💾</span> 儲存並同步至雲端
                                    </button>
                                    <span class="font-bold text-blue-800 text-base">👤 ${username}</span>
                                    <button onclick="logout()" class="text-rose-500 hover:text-white bg-white hover:bg-rose-400 px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm transition-all font-bold text-xs flex items-center"><span class="mr-1">🏠</span>返回首頁</button>
                                </div>
                            </div>
                        </div>

                        <!-- 冷氣表格主體 -->
                        <div class="glass-panel rounded-3xl shadow-xl flex flex-col flex-1 min-h-0 mb-2 overflow-hidden bg-white/50">
                            <div class="overflow-auto custom-scrollbar flex-1 relative">
                                <table class="w-full text-left min-w-[1500px]">
                                    <thead>
                                        <tr>
                                            <!-- Zone 1 (Cyan) -->
                                            <th class="sticky-col-header bg-cyan-600 text-white p-3 text-center border-b border-r border-cyan-500 w-[100px]">🏪 分店</th>
                                            <th class="sticky top-0 z-30 bg-cyan-500 text-white p-3 text-center border-b border-r border-cyan-400 w-[140px]">📸 照片</th>
                                            <th class="sticky top-0 z-30 bg-cyan-500 text-white p-3 text-center border-b border-r border-cyan-400 w-[130px]">❄️ 冷氣品牌</th>
                                            <th class="sticky top-0 z-30 bg-cyan-500 text-white p-3 text-center border-b border-r border-cyan-400 w-[130px]">🏷️ 型號</th>
                                            
                                            <!-- Zone 2 (Blue) -->
                                            <th class="sticky top-0 z-30 bg-blue-500 text-white p-3 text-center border-b border-r border-blue-400 w-[150px]">📅 安裝日期</th>
                                            <th class="sticky top-0 z-30 bg-blue-500 text-white p-3 text-center border-b border-r border-blue-400 w-[130px]">⏳ 使用時間</th>
                                            
                                            <!-- Zone 3 (Teal) -->
                                            <th class="sticky top-0 z-30 bg-teal-500 text-white p-3 text-center border-b border-r border-teal-400 w-[150px]">💦 冷氣清洗日期</th>
                                            <th class="sticky top-0 z-30 bg-teal-500 text-white p-3 text-center border-b border-r border-teal-400 w-[130px]">⏳ 使用時間</th>
                                            
                                            <!-- Zone 4 (Emerald) -->
                                            <th class="sticky top-0 z-30 bg-emerald-500 text-white p-3 text-center border-b border-r border-emerald-400 w-[150px]">🧽 濾網清洗日期</th>
                                            <th class="sticky top-0 z-30 bg-emerald-500 text-white p-3 text-center border-b border-r border-emerald-400 w-[130px]">⏳ 使用時間</th>
                                            
                                            <!-- Zone 5 (Indigo) -->
                                            <th class="sticky top-0 z-30 bg-indigo-500 text-white p-3 text-center border-b border-indigo-400 w-[200px]">🛠️ 維修紀錄</th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-body">
                                        <!-- 資料動態產生 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 彈出式視窗 (多筆維修紀錄) -->
                <div id="repair-modal" class="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity duration-300">
                    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden border-4 border-indigo-200 transform transition-all scale-95 flex flex-col max-h-[85vh]" id="repair-modal-content">
                        <!-- 視窗標頭 -->
                        <div class="bg-gradient-to-r from-indigo-500 to-purple-500 p-5 flex justify-between items-center shrink-0">
                            <h2 class="text-2xl font-bold text-white drop-shadow-md flex items-center gap-2">
                                <span>🛠️</span>
                                <span id="repair-modal-title">維修紀錄</span>
                            </h2>
                            <button onclick="closeRepairModal()" class="text-white hover:text-indigo-100 bg-white/20 hover:bg-white/40 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl">
                                ❌
                            </button>
                        </div>

                        <!-- 視窗內容區 (清單) -->
                        <div class="p-6 bg-indigo-50/50 flex-1 overflow-y-auto custom-scrollbar">
                            <div id="repair-list" class="space-y-3 mb-6">
                                <!-- 維修紀錄將渲染在此 -->
                            </div>

                            <!-- 新增紀錄表單 -->
                            <div class="bg-white p-4 rounded-2xl border-2 border-indigo-100 shadow-sm flex flex-col gap-3">
                                <h3 class="font-bold text-indigo-800 border-b border-indigo-50 pb-2">➕ 新增維修紀錄</h3>
                                <div class="grid grid-cols-1 md:grid-cols-[140px_1fr_120px] gap-3">
                                    <input type="date" id="new-repair-date" class="p-2 rounded-xl border border-indigo-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm text-gray-700 shadow-inner">
                                    <input type="text" id="new-repair-item" placeholder="填寫維修項目..." class="p-2 rounded-xl border border-indigo-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm text-gray-700 shadow-inner">
                                    <input type="number" id="new-repair-amount" placeholder="金額(元)" class="p-2 rounded-xl border border-indigo-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm text-gray-700 shadow-inner text-right">
                                </div>
                                <button onclick="addRepairRecord()" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-2 rounded-xl transition-colors border border-indigo-300">
                                    儲存此筆紀錄
                                </button>
                            </div>
                        </div>
                        
                        <!-- 按鈕區 -->
                        <div class="p-4 bg-white border-t border-indigo-100 flex justify-end shrink-0">
                            <button onclick="closeRepairModal()" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 shadow-lg transform hover:scale-105 transition-all">
                                完成並關閉視窗
                            </button>
                        </div>
                    </div>
                </div>
            `;
            renderMainGrid();
        };

        window.renderMainGrid = () => {
            const tbody = document.getElementById('table-body');
            if(!tbody) return;

            let html = '';

            // 針對每一間分店建立獨立的 tbody 以實現 hover 與區段管理
            for (const [branch, acList] of Object.entries(branchesMap)) {
                html += `<tbody class="hover:bg-white/40 transition-colors">`;
                
                acList.forEach((ac, index) => {
                    // 初始化確保資料結構完整
                    const data = appData[ac.photo] || { brand: '', model: '', installDate: '', acWashDate: '', filterWashDate: '', repairs: [] };
                    if (!data.repairs) data.repairs = [];

                    // 將普通內層底線移除，因為我們有專屬的實體分隔線
                    const bb = 'border-b-0';

                    html += `<tr>`;
                    
                    // Zone 1: Branch (第一列專屬，跨列置中)
                    if (index === 0) {
                        html += `<td rowspan="${acList.length}" class="sticky-col bg-white border-r-2 border-cyan-200 border-b-0 text-center font-extrabold text-cyan-800 text-lg align-middle bg-clip-padding p-2 w-[100px]">${branch}</td>`;
                    }
                    
                    // Zone 1: Photo, Brand, Model (Cyan Zone)
                    html += `
                        <td class="bg-cyan-50/70 p-2 border-r border-cyan-100 ${bb} align-middle w-[140px]">
                            <img src="images/${ac.photo}" class="w-full h-[70px] object-cover rounded-xl shadow-sm border border-cyan-200" alt="${ac.photo}" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2270%22 viewBox=%220 0 120 70%22%3E%3Crect width=%22120%22 height=%2270%22 fill=%22%23cffafe%22/%3E%3Ctext x=%2260%22 y=%2240%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2214%22 text-anchor=%22middle%22 fill=%22%230891b2%22%3E無照片%3C/text%3E%3C/svg%3E';">
                        </td>
                        <td class="bg-cyan-50/70 p-2 border-r border-cyan-100 ${bb} align-middle w-[130px]">
                            <select class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-cyan-900 font-bold bg-white" data-photo="${ac.photo}" data-field="brand">
                                <option value="" ${data.brand === '' ? 'selected' : ''}></option>
                                <option value="華菱" ${data.brand === '華菱' ? 'selected' : ''}>華菱</option>
                                <option value="富士通" ${data.brand === '富士通' ? 'selected' : ''}>富士通</option>
                                <option value="聲寶" ${data.brand === '聲寶' ? 'selected' : ''}>聲寶</option>
                                <option value="日立" ${data.brand === '日立' ? 'selected' : ''}>日立</option>
                                <option value="冰點" ${data.brand === '冰點' ? 'selected' : ''}>冰點</option>
                            </select>
                        </td>
                        <td class="bg-cyan-50/70 p-2 border-r-2 border-cyan-200 ${bb} align-middle w-[130px]">
                            <input type="text" class="ac-input w-full p-2.5 rounded-xl border border-cyan-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none shadow-inner text-cyan-900 font-bold placeholder-cyan-300 bg-white" placeholder="輸入型號" data-photo="${ac.photo}" data-field="model" value="${data.model}">
                        </td>
                    `;
                    
                    // Zone 2: Install Date, Usage Time (Blue Zone)
                    html += `
                        <td class="bg-blue-50/70 p-2 border-r border-blue-100 ${bb} align-middle w-[150px]">
                            <input type="date" class="ac-input w-full p-2.5 rounded-xl border border-blue-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none shadow-inner text-sm text-blue-900 bg-white" data-photo="${ac.photo}" data-field="installDate" value="${data.installDate}">
                        </td>
                        <td class="bg-blue-50/70 p-2 border-r-2 border-blue-200 ${bb} align-middle w-[130px]">
                            <div id="f-${ac.photo}" class="text-sm font-bold text-blue-700 text-center bg-white p-2.5 rounded-xl border border-blue-100 shadow-sm h-[46px] flex items-center justify-center">${calculateUsageTime(data.installDate).text}</div>
                        </td>
                    `;
                    
                    // Zone 3: AC Wash Date, Usage Time (Teal Zone)
                    html += `
                        <td class="bg-teal-50/70 p-2 border-r border-teal-100 ${bb} align-middle w-[150px]">
                            <input type="date" class="ac-input w-full p-2.5 rounded-xl border border-teal-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none shadow-inner text-sm text-teal-900 bg-white" data-photo="${ac.photo}" data-field="acWashDate" value="${data.acWashDate}">
                        </td>
                        <td class="bg-teal-50/70 p-2 border-r-2 border-teal-200 ${bb} align-middle w-[130px]">
                            <div id="h-${ac.photo}" class="text-sm font-bold text-teal-700 text-center bg-white p-2.5 rounded-xl border border-teal-100 shadow-sm h-[46px] flex items-center justify-center">${calculateUsageTime(data.acWashDate).text}</div>
                        </td>
                    `;
                    
                    // Zone 4: Filter Wash Date, Usage Time (Emerald Zone)
                    html += `
                        <td class="bg-emerald-50/70 p-2 border-r border-emerald-100 ${bb} align-middle w-[150px]">
                            <input type="date" class="ac-input w-full p-2.5 rounded-xl border border-emerald-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none shadow-inner text-sm text-emerald-900 bg-white" data-photo="${ac.photo}" data-field="filterWashDate" value="${data.filterWashDate}">
                        </td>
                        <td class="bg-emerald-50/70 p-2 border-r-2 border-emerald-200 ${bb} align-middle w-[130px]">
                            <div id="j-${ac.photo}" class="text-sm text-center flex items-center justify-center h-[46px]">${renderFilterTime(data.filterWashDate)}</div>
                        </td>
                    `;

                    // Zone 5: Repair Records Button (Indigo Zone)
                    html += `
                        <td class="bg-indigo-50/70 p-2 ${bb} align-middle w-[200px]">
                            <button onclick="openRepairModal('${ac.photo}', '${branch}')" id="btn-repair-${ac.photo}" class="w-full bg-white hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 px-3 rounded-xl transition-colors border border-indigo-200 shadow-sm flex items-center justify-center gap-2">
                                <span>📝</span> <span>維修紀錄 (${data.repairs.length}筆)</span>
                            </button>
                        </td>
                    `;

                    html += `</tr>`;
                });
                
                // 完全放棄 border-b 改用實體獨立的列 (`<tr>`) 作為分隔線，解決 border-r 切割問題
                html += `
                    <tr class="bg-cyan-500">
                        <td class="sticky-col p-0 border-0 bg-cyan-500"><div class="h-1 w-full bg-cyan-500"></div></td>
                        <td colspan="10" class="p-0 border-0 bg-cyan-500"><div class="h-1 w-full bg-cyan-500"></div></td>
                    </tr>
                `;
                html += `</tbody>`;
            }

            tbody.innerHTML = html;
        };

        // ==========================================
        //  Repair Modal Logic
        // ==========================================
        window.openRepairModal = (photo, branch) => {
            currentRepairPhoto = photo;
            
            // 初始化若無資料
            if (!appData[photo]) {
                appData[photo] = { brand: '', model: '', installDate: '', acWashDate: '', filterWashDate: '', repairs: [] };
            }
            if (!appData[photo].repairs) appData[photo].repairs = [];

            document.getElementById('repair-modal-title').innerText = `${branch} - 冷氣 (${photo}) 維修紀錄`;
            
            // 清空輸入框
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('new-repair-date').value = today;
            document.getElementById('new-repair-item').value = '';
            document.getElementById('new-repair-amount').value = '';

            renderRepairList();

            const modal = document.getElementById('repair-modal');
            const modalContent = document.getElementById('repair-modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        };

        window.closeRepairModal = () => {
            const modal = document.getElementById('repair-modal');
            const modalContent = document.getElementById('repair-modal-content');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
            
            // 關閉時重新渲染主表格對應的按鈕數量及同步雲端
            if (currentRepairPhoto) {
                const count = appData[currentRepairPhoto].repairs.length;
                const btn = document.getElementById(`btn-repair-${currentRepairPhoto}`);
                if (btn) btn.innerHTML = `<span>📝</span> <span>維修紀錄 (${count}筆)</span>`;
            }
            saveUserDataToCloud();
            currentRepairPhoto = '';
        };

        window.renderRepairList = () => {
            const listContainer = document.getElementById('repair-list');
            const repairs = appData[currentRepairPhoto].repairs;

            if (repairs.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-6 text-indigo-300 font-bold border-2 border-dashed border-indigo-200 rounded-2xl bg-white/50">尚無任何維修紀錄</div>`;
                return;
            }

            let html = '';
            repairs.forEach((record, index) => {
                html += `
                    <div class="bg-white p-3 rounded-2xl border border-indigo-100 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-100 text-indigo-700 font-extrabold px-3 py-1 rounded-lg text-sm">${record.date}</div>
                            <div class="font-bold text-gray-700">${record.item}</div>
                        </div>
                        <div class="flex items-center justify-between md:justify-end gap-4 w-full md:w-auto border-t md:border-t-0 border-indigo-50 pt-2 md:pt-0">
                            <div class="font-bold text-rose-600 bg-rose-50 px-3 py-1 rounded-lg text-sm">-$${Number(record.amount).toLocaleString('zh-TW')}</div>
                            <button onclick="deleteRepairRecord(${index})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors text-sm font-bold border border-transparent hover:border-red-200">
                                🗑️ 刪除
                            </button>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
        };

        window.addRepairRecord = () => {
            const dateEl = document.getElementById('new-repair-date');
            const itemEl = document.getElementById('new-repair-item');
            const amountEl = document.getElementById('new-repair-amount');

            if (!itemEl.value.trim() || !amountEl.value.trim()) {
                alert("請填寫維修項目與金額！");
                return;
            }

            appData[currentRepairPhoto].repairs.push({
                date: dateEl.value,
                item: itemEl.value.trim(),
                amount: amountEl.value.trim()
            });

            // 存入本機暫存並清空輸入
            userData.acData = appData;
            saveLocalData(username);
            
            itemEl.value = '';
            amountEl.value = '';
            
            renderRepairList();
        };

        window.deleteRepairRecord = (index) => {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            appData[currentRepairPhoto].repairs.splice(index, 1);
            userData.acData = appData;
            saveLocalData(username);
            renderRepairList();
        };

        // 全域事件監聽：當任何 input 變更時，即時運算更新畫面，並儲存至暫存檔
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('ac-input')) {
                const photo = e.target.dataset.photo;
                const field = e.target.dataset.field;
                if (!appData[photo]) {
                    appData[photo] = { brand: '', model: '', installDate: '', acWashDate: '', filterWashDate: '', repairs: [] };
                }
                appData[photo][field] = e.target.value;

                // 即時運算並只更新指定欄位
                if (field === 'installDate') {
                    document.getElementById(`f-${photo}`).innerText = calculateUsageTime(e.target.value).text;
                } else if (field === 'acWashDate') {
                    document.getElementById(`h-${photo}`).innerText = calculateUsageTime(e.target.value).text;
                } else if (field === 'filterWashDate') {
                    document.getElementById(`j-${photo}`).innerHTML = renderFilterTime(e.target.value);
                }

                // 本機自動暫存
                userData.acData = appData;
                saveLocalData(username);
            }
        });

        // Initialize App
        initApp();

    </script>
</body>
</html>
